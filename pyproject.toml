[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "marvex"
version = "0.1.0"
description = "Marvex v1 contract package"
requires-python = ">=3.11"
dependencies = [
  "litellm==1.83.13",
  "mcp==1.27.1",
  "openai==2.24.0",
  "pydantic>=2,<3",
]

[project.optional-dependencies]
test = [
  "pytest>=8,<9",
]

[tool.setuptools.packages.find]
include = ["packages*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
