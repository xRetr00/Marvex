[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "marvex"
version = "0.1.0"
description = "Marvex v1 contract package"
requires-python = ">=3.11"
dependencies = [
  "litellm==1.84.0",
  "mcp==1.27.1",
  "openai==2.37.0",
  "openai-agents==0.17.2",
  "playwright==1.59.0",
  "pydantic>=2,<3",
  "semantic-router==0.1.14",
  "Authlib==1.7.2",
]

[project.optional-dependencies]
test = [
  "pytest>=8,<9",
]

[tool.setuptools.packages.find]
include = ["packages*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
