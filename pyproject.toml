[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "marvex"
version = "0.1.0"
description = "Marvex v1 contract package"
requires-python = ">=3.11"
dependencies = [
  "litellm==1.85.0",
  "mcp==1.27.1",
  "openai==2.37.0",
  "openai-agents==0.17.2",
  "playwright==1.60.0",
  "pydantic>=2,<3",
  "semantic-router[hybrid]==0.1.14",
  "Authlib==1.7.2",
  "browser-use==0.11.13",
  "llama-index-core>=0.14.22",
  "ddgs>=9.14.4",
]

[project.optional-dependencies]
test = [
  "pytest>=8,<9",
]

[tool.setuptools.packages.find]
include = ["packages*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[dependency-groups]
dev = [
    "pip>=26,<27",
    "pytest>=8,<9",
]
