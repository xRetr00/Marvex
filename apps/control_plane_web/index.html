<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f9fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16-dark.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32-dark.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192-dark.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512-dark.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)" />
    <title>Marvex Control Plane</title>
    <script>
      (function () {
        const storageKey = "marvex-control-plane-theme";
        const stored = localStorage.getItem(storageKey);
        const prefersDark = typeof window.matchMedia === "function" && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = stored === "light" || stored === "dark" ? stored : (prefersDark ? "dark" : "light");
        if (theme === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
